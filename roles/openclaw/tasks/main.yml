---
- name: Create OpenClaw directories
  ansible.builtin.command: >
    pct exec {{ openclaw_lxc_id }} -- mkdir -p {{ openclaw_data_path }}
  changed_when: true

- name: Generate docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /tmp/openclaw-docker-compose.yml
    mode: '0644'

- name: Generate nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /tmp/openclaw-nginx.conf
    mode: '0644'

- name: Generate landing.html
  ansible.builtin.template:
    src: landing.html.j2
    dest: /tmp/openclaw-landing.html
    mode: '0644'

- name: Copy docker-compose.yml to LXC
  ansible.builtin.shell: >
    cat /tmp/openclaw-docker-compose.yml | pct exec {{ openclaw_lxc_id }} -- tee {{ openclaw_base_path }}/docker-compose.yml > /dev/null
  changed_when: true

- name: Copy nginx.conf to LXC
  ansible.builtin.shell: >
    cat /tmp/openclaw-nginx.conf | pct exec {{ openclaw_lxc_id }} -- tee {{ openclaw_base_path }}/nginx.conf > /dev/null
  changed_when: true

- name: Copy landing.html to LXC
  ansible.builtin.shell: >
    cat /tmp/openclaw-landing.html | pct exec {{ openclaw_lxc_id }} -- tee {{ openclaw_base_path }}/landing.html > /dev/null
  changed_when: true

- name: Stop existing OpenClaw containers
  ansible.builtin.command: >
    pct exec {{ openclaw_lxc_id }} -- bash -c 'cd {{ openclaw_base_path }} && docker compose down 2>/dev/null || true'
  failed_when: false
  changed_when: false

- name: Remove any orphaned OpenClaw containers
  ansible.builtin.command: >
    pct exec {{ openclaw_lxc_id }} -- docker rm -f {{ openclaw_container_name }} openclaw-proxy
  failed_when: false
  changed_when: false

- name: Pull latest OpenClaw image
  ansible.builtin.command: >
    pct exec {{ openclaw_lxc_id }} -- docker pull {{ openclaw_image }}
  changed_when: true

- name: Pull nginx image
  ansible.builtin.command: >
    pct exec {{ openclaw_lxc_id }} -- docker pull nginx:alpine
  changed_when: true

- name: Start OpenClaw stack
  ansible.builtin.command: >
    pct exec {{ openclaw_lxc_id }} -- bash -c 'cd {{ openclaw_base_path }} && docker compose up -d'
  changed_when: true

- name: Wait for OpenClaw to be ready
  ansible.builtin.command: >
    pct exec {{ openclaw_lxc_id }} -- curl -sf http://localhost:{{ openclaw_port }}/health
  register: openclaw_health
  until: openclaw_health.rc == 0
  retries: 12
  delay: 10
  failed_when: false

- name: Display deployment status
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "OpenClaw deployed!"
      - "=========================================="
      - ""
      - "Public URL: https://{{ openclaw_subdomain }}.{{ public_domain }}"
      - "LLM Provider: Anthropic Claude"
      - ""
      - "Discord: {{ 'Configured' if openclaw_discord_token != 'REPLACE_WITH_DISCORD_BOT_TOKEN' else 'Not configured (update vault)' }}"
      - "Health check: {{ 'OK' if openclaw_health.rc == 0 else 'FAILED - check logs with: pct exec 200 -- docker logs openclaw' }}"
      - "=========================================="
